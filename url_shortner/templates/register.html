<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkVault — Register</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --surface: #12121a; --border: #1e1e2e;
    --accent: #7c3aed; --accent2: #06b6d4; --text: #e2e2f0; --muted: #6b6b8a;
  }
  body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(6,182,212,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(6,182,212,0.04) 1px, transparent 1px); background-size: 40px 40px; animation: gridMove 20s linear infinite; pointer-events: none; }
  @keyframes gridMove { from { transform: translateY(0); } to { transform: translateY(40px); } }
  .glow { position: fixed; width: 500px; height: 500px; border-radius: 50%; filter: blur(120px); pointer-events: none; opacity: 0.12; }
  .glow-1 { background: var(--accent2); top: -100px; right: -100px; }
  .glow-2 { background: var(--accent); bottom: -100px; left: -100px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 48px 40px; width: 100%; max-width: 420px; position: relative; z-index: 1; animation: fadeUp 0.5s ease forwards; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
  .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 28px; letter-spacing: -1px; margin-bottom: 8px; }
  .logo span { color: var(--accent); }
  .subtitle { color: var(--muted); font-size: 13px; margin-bottom: 36px; }
  label { display: block; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 14px; padding: 12px 16px; margin-bottom: 20px; outline: none; transition: border-color 0.2s; }
  input:focus { border-color: var(--accent2); }
  button { width: 100%; background: var(--accent2); color: #000; border: none; border-radius: 8px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; padding: 13px; cursor: pointer; transition: opacity 0.2s, transform 0.1s; margin-top: 4px; }
  button:hover { opacity: 0.85; }
  button:active { transform: scale(0.98); }
  .footer { text-align: center; margin-top: 24px; font-size: 13px; color: var(--muted); }
  .footer a { color: var(--accent); text-decoration: none; }
  .footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="glow glow-1"></div>
<div class="glow glow-2"></div>
<div class="card">
  <div class="logo">Link<span>Vault</span></div>
  <div class="subtitle">Create your account</div>
  <form method="post">
    <label>Username</label>
    <input name="username" placeholder="choose_a_username" required autofocus>
    <label>Password</label>
    <input name="password" type="password" placeholder="••••••••" required>
    <button type="submit">Create Account →</button>
  </form>
  <div class="footer">Already have an account? <a href="/login">Sign in</a></div>
</div>
</body>
</html>
